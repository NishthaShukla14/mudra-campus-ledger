<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - M U D ₹ A </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes scan {
            0%   { top: 0;    opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scanning-line { animation: scan 2s infinite linear; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen font-sans">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md relative z-10 border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-slate-800 tracking-tight mb-2">
                M U D <span class="text-indigo-600 font-black">₹</span> A
            </h1>
            <p class="text-slate-500">Enter your credentials or use FaceID</p>
        </div>

        <!-- Password login form -->
        <form method="POST" action="{% url 'login' %}" class="space-y-5">
            {% csrf_token %}

            {% if form.errors %}
            <div class="bg-red-50 text-red-600 p-3 rounded-lg text-sm text-center border border-red-200 font-bold mb-4 animate-pulse">
                <i class="fa-solid fa-circle-exclamation mr-1"></i> Invalid Roll Number or Password!
            </div>
            {% endif %}

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Roll Number</label>
                <input type="text" name="username" required
                       class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all"
                       placeholder="Enter your roll number">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all"
                       placeholder="••••••••">
            </div>
            <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-lg shadow-indigo-200 transition-all">
                Login with Password
            </button>
        </form>

        <div class="my-6 flex items-center before:flex-1 before:border-t before:border-slate-200 after:flex-1 after:border-t after:border-slate-200">
            <span class="px-4 text-sm text-slate-400 font-medium">OR</span>
        </div>

        <!-- FaceID trigger button -->
        <button type="button" id="openFaceId"
                class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 rounded-lg shadow-lg flex items-center justify-center gap-2 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/>
            </svg>
            Login with FaceID
        </button>

        <p class="text-center text-sm text-slate-500 mt-6">
            Don't have an account?
            <a href="{% url 'signup' %}" class="text-indigo-600 font-bold hover:underline">Sign up</a>
        </p>
    </div>


    <!-- ══════════════════════════════ FaceID Scanner Modal ══ -->
    <div id="faceIdModal"
         class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-50 hidden flex items-center justify-center opacity-0 transition-opacity duration-300">
        <div id="modalContent"
             class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm flex flex-col items-center relative transform scale-95 transition-transform duration-300">

            <button id="closeFaceId" class="absolute top-4 right-4 text-slate-400 hover:text-slate-700">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>

            <h3 class="text-xl font-bold text-slate-800 mb-4">Biometric Scanner</h3>

            <!-- Roll number input (identifies who the face belongs to) -->
            <div class="w-full mb-4">
                <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">
                    Your Roll Number
                </label>
                <input type="text" id="faceRollNumber" placeholder="e.g. 12345"
                       class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
            </div>

            <!-- Camera viewport -->
            <div class="relative w-56 h-56 rounded-full overflow-hidden border-4 border-indigo-100 shadow-inner mb-6 bg-slate-100 flex items-center justify-center">
                <video id="cameraFeed" autoplay playsinline muted
                       class="object-cover w-full h-full transform scale-x-[-1] hidden"></video>
                <div id="cameraLoading" class="text-slate-400 text-sm animate-pulse text-center px-4">
                    Enter roll number &amp; click "Start Camera"
                </div>
                <div id="scannerLine"
                     class="absolute left-0 w-full h-1 bg-green-400 shadow-[0_0_15px_rgba(74,222,128,1)] hidden z-10"></div>
            </div>

            <!-- Status message -->
            <p id="statusText" class="text-sm font-medium text-slate-500 mb-4 h-5 text-center">
                Please look directly at the camera.
            </p>

            <!-- Toast for FaceID errors -->
            <div id="faceToast" class="hidden w-full mb-3 px-4 py-2 rounded-lg text-xs font-semibold text-center"></div>

            <!-- Start camera button (shows first) -->
            <button type="button" id="startCameraBtn"
                    class="w-full bg-slate-700 hover:bg-slate-800 text-white font-bold py-2.5 rounded-xl transition-all">
                Start Camera
            </button>

            <!-- Scan & authenticate button (shows after camera starts) -->
            <button type="button" id="scanBtn"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-200 transition-all hidden mt-2">
                Scan &amp; Authenticate
            </button>
        </div>
    </div>


    <!-- Face API (vladmandic fork is maintained and works well) -->
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <script>
    function getCsrf() {
        const name  = 'csrftoken';
        const parts = document.cookie.split(';');
        for (let p of parts) {
            const [k, v] = p.trim().split('=');
            if (k === name) return decodeURIComponent(v);
        }
        return '';
    }

    function showFaceToast(msg, ok) {
        const el = document.getElementById('faceToast');
        el.textContent = msg;
        el.className = `w-full mb-3 px-4 py-2 rounded-lg text-xs font-semibold text-center ${
            ok ? 'bg-green-50 border border-green-200 text-green-700'
               : 'bg-red-50 border border-red-200 text-red-700'
        }`;
        el.classList.remove('hidden');
    }

    const openBtn      = document.getElementById('openFaceId');
    const closeBtn     = document.getElementById('closeFaceId');
    const modal        = document.getElementById('faceIdModal');
    const modalContent = document.getElementById('modalContent');
    const video        = document.getElementById('cameraFeed');
    const cameraLoading = document.getElementById('cameraLoading');
    const startCameraBtn = document.getElementById('startCameraBtn');
    const scanBtn      = document.getElementById('scanBtn');
    const statusText   = document.getElementById('statusText');
    const scannerLine  = document.getElementById('scannerLine');
    let stream         = null;
    let modelsLoaded   = false;

    async function loadModels() {
        if (modelsLoaded) return;
        statusText.textContent = "Loading Face AI models...";
        const modelUrl = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
        await Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri(modelUrl),
            faceapi.nets.faceLandmark68Net.loadFromUri(modelUrl),
            faceapi.nets.faceRecognitionNet.loadFromUri(modelUrl)
        ]);
        modelsLoaded = true;
        statusText.textContent = "Please look directly at the camera.";
    }

    function openModal() {
        modal.classList.remove('hidden');
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            modalContent.classList.remove('scale-95');
            modalContent.classList.add('scale-100');
        }, 10);
    }

    function closeModal() {
        modal.classList.add('opacity-0');
        modalContent.classList.remove('scale-100');
        modalContent.classList.add('scale-95');
        setTimeout(() => {
            modal.classList.add('hidden');
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
            video.classList.add('hidden');
            cameraLoading.classList.remove('hidden');
            cameraLoading.textContent = 'Enter roll number & click "Start Camera"';
            startCameraBtn.classList.remove('hidden');
            scanBtn.classList.add('hidden');
            scanBtn.disabled = false;
            scanBtn.textContent = 'Scan & Authenticate';
            scannerLine.classList.remove('scanning-line');
            scannerLine.classList.add('hidden');
            statusText.textContent = 'Please look directly at the camera.';
            statusText.className = 'text-sm font-medium text-slate-500 mb-4 h-5 text-center';
            document.getElementById('faceToast').classList.add('hidden');
        }, 300);
    }

    openBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

    startCameraBtn.addEventListener('click', async () => {
        const roll = document.getElementById('faceRollNumber').value.trim();
        if (!roll) {
            showFaceToast('Please enter your roll number first.', false);
            return;
        }

        startCameraBtn.textContent = 'Starting Camera...';
        startCameraBtn.disabled    = true;
        
        try {
            await loadModels();
        } catch (e) {
            showFaceToast('Failed to load Face AI models.', false);
            startCameraBtn.disabled = false;
            startCameraBtn.textContent = 'Start Camera';
            return;
        }

        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.classList.remove('hidden');
            cameraLoading.classList.add('hidden');
            startCameraBtn.classList.add('hidden');
            scanBtn.classList.remove('hidden');
            statusText.textContent = 'Camera active. Click below to authenticate.';
        } catch (err) {
            showFaceToast('Camera access denied.', false);
            startCameraBtn.disabled    = false;
            startCameraBtn.textContent = 'Start Camera';
        }
    });

    scanBtn.addEventListener('click', async () => {
        const roll = document.getElementById('faceRollNumber').value.trim();
        if (!roll) {
            showFaceToast('Roll number missing.', false);
            return;
        }

        scanBtn.disabled  = true;
        scanBtn.textContent = 'Detecting Face...';
        statusText.textContent = 'Hold still... extracting features...';
        statusText.classList.add('animate-pulse');
        scannerLine.classList.remove('hidden');
        scannerLine.classList.add('scanning-line');

        // Extract face features
        const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
        
        if (!detection) {
            showFaceToast('❌ No face detected. Please try again.', false);
            scanBtn.disabled    = false;
            scanBtn.textContent = 'Scan & Authenticate';
            statusText.classList.remove('animate-pulse');
            scannerLine.classList.remove('scanning-line');
            scannerLine.classList.add('hidden');
            statusText.textContent = 'Please look directly at the camera.';
            return;
        }
        
        statusText.textContent = 'Verifying with server...';
        const descriptorArray = Array.from(detection.descriptor);

        try {
            const res  = await fetch('{% url "face_login_verify" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken':  getCsrf(),
                },
                body: JSON.stringify({ 
                    roll_number: roll,
                    descriptor: descriptorArray 
                }),
            });
            const data = await res.json();

            statusText.classList.remove('animate-pulse');
            scannerLine.classList.remove('scanning-line');
            scannerLine.classList.add('hidden');

            if (data.success) {
                statusText.textContent = '✅ ' + data.message + ' Redirecting...';
                statusText.className   = 'text-sm font-medium text-green-500 mb-4 h-5 text-center';
                video.style.border     = '4px solid #4ade80';
                setTimeout(() => {
                    window.location.href = data.redirect;
                }, 1200);
            } else {
                showFaceToast('❌ ' + data.message, false);
                scanBtn.disabled    = false;
                scanBtn.textContent = 'Scan & Authenticate';
                statusText.textContent = 'Please look directly at the camera.';
            }
        } catch (err) {
            showFaceToast('❌ Network error. Please try again.', false);
            scanBtn.disabled    = false;
            scanBtn.textContent = 'Scan & Authenticate';
            statusText.classList.remove('animate-pulse');
            scannerLine.classList.remove('scanning-line');
            scannerLine.classList.add('hidden');
        }
    });
    </script>
</body>
</html>
