{% extends 'core/base.html' %}
{% block content %}
<div class="max-w-xl mx-auto py-10 px-4 sm:px-6">
    <div class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-slate-800">Fee Payment</h1>
        <p class="text-slate-500 mt-2">Instantly pay your university fees using your wallet.</p>
    </div>

    <div class="bg-white rounded-[2rem] p-8 shadow-sm border border-slate-100">
        <div class="mb-6 flex justify-between items-center bg-slate-50 p-4 rounded-2xl">
            <span class="text-slate-500 font-medium">Available Balance</span>
            <span class="text-lg font-bold text-indigo-600">₹<span id="current-balance">{{ request.user.wallet_balance|default:"0.00" }}</span></span>
        </div>

        <form id="fee-form" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Select Fee Type</label>
                <select id="fee-type" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none">
                    <option value="Tuition Fee">Tuition Fee</option>
                    <option value="Hostel Fee">Hostel Fee</option>
                    <option value="Mess Fee">Mess Fee</option>
                    <option value="Exam Fee">Exam Fee</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Amount (₹)</label>
                <input type="number" id="fee-amount" placeholder="Enter amount" required min="1"
                       class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none">
            </div>

            <button type="submit" id="btn-pay" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-200 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                <i class="fa-solid fa-lock text-sm"></i> Pay Securely
            </button>
        </form>
    </div>
</div>

<script>
document.getElementById('fee-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-pay');
    const amount = document.getElementById('fee-amount').value;
    const feeType = document.getElementById('fee-type').value;

    if (!amount || amount <= 0) {
        alert("Please enter a valid amount.");
        return;
    }

    const originalText = btn.innerHTML;
    btn.innerHTML = 'Processing...';
    btn.disabled = true;

    fetch("{% url 'fee_payment' %}", {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        },
        body: JSON.stringify({
            amount: amount,
            fee_type: feeType
        })
    })
    .then(res => res.json())
    .then(data => {
        btn.innerHTML = originalText;
        btn.disabled = false;
        
        if (data.success) {
            alert('Success: ' + data.message);
            document.getElementById('current-balance').textContent = parseFloat(data.new_balance).toFixed(2);
            document.getElementById('fee-amount').value = '';
        } else {
            alert('Error: ' + data.message);
        }
    })
    .catch(err => {
        btn.innerHTML = originalText;
        btn.disabled = false;
        alert('An error occurred during payment.');
    });
});
</script>
{% endblock %}
